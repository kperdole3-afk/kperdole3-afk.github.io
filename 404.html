<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Страница не найдена</title>
    <style>


        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-image: url(assets/img/giphy.gif);
            background-repeat: no-repeat;
            background-size: 100%;
            max-height: 10vh;
        }
        #error404__main-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow: hidden;
            position: relative;
        }

       

        .error404__floating-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: error404-float 20s infinite ease-in-out;
        }

        .error404__floating-circle:nth-child(1) {
            width: 80px;
            height: 80px;
            left: 10%;
            top: 20%;
            animation-delay: 0s;
        }

        .error404__floating-circle:nth-child(2) {
            width: 120px;
            height: 120px;
            right: 15%;
            top: 40%;
            animation-delay: 2s;
        }

        .error404__floating-circle:nth-child(3) {
            width: 60px;
            height: 60px;
            left: 20%;
            bottom: 30%;
            animation-delay: 4s;
        }

        .error404__floating-circle:nth-child(4) {
            width: 100px;
            height: 100px;
            right: 25%;
            bottom: 20%;
            animation-delay: 6s;
        }

        

        #error404__content-wrapper {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        

        #error404__main-number {
            font-size: clamp(120px, 20vw, 200px);
            font-weight: 900;
            color: white;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            letter-spacing: 10px;
            animation: error404-glitch 3s infinite;
            position: relative;
            display: inline-block;
        }

      

        

        @keyframes error404-bounce {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            25% {
                transform: translateY(-20px) rotate(-5deg);
            }
            75% {
                transform: translateY(-10px) rotate(5deg);
            }
        }

        #error404__title-text {
            font-size: clamp(24px, 5vw, 36px);
            color: white;
            font-weight: 700;
            margin-bottom: 1rem;
            
        }
        #error404__description-text {
            font-size: clamp(16px, 3vw, 18px);
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        #error404__button-home {
            display: inline-block;
            padding: 16px 48px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        #error404__button-home::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(102, 126, 234, 0.1);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        #error404__button-home:hover::before {
            width: 300px;
            height: 300px;
        }

        #error404__button-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

      

        #error404__decorative-line {
            width: 100px;
            height: 4px;
            background: white;
            margin: 2rem auto;
            border-radius: 2px;
            animation: error404-pulse 2s infinite;
        }

        @keyframes error404-pulse {
            0%, 100% {
                opacity: 0.5;
                transform: scaleX(1);
            }
            50% {
                opacity: 1;
                transform: scaleX(1.2);
            }
        }

        
    </style>
</head>
<body>
    <div id="error404__main-container">
        <div id="error404__background-animation">
            <div class="error404__floating-circle"></div>
            <div class="error404__floating-circle"></div>
            <div class="error404__floating-circle"></div>
            <div class="error404__floating-circle"></div>
        </div>
        
        <div id="error404__content-wrapper">
            
            
            <div id="error404__number-container">
                <div id="error404__main-number">404</div>
            </div>
            
            <div id="error404__decorative-line"></div>
            
            <h1 id="error404__title-text">Страница не найдена</h1>
            
            <p id="error404__description-text">
                К сожалению, страница, которую вы ищете, не существует или была перемещена. Делал Лукович
            </p>
            
            <a href="kperdole3-afk.github.io" id="error404__button-home">
                <span>Вернуться на главную</span>
            </a>
        </div>
    </div>
</body>
</html>
